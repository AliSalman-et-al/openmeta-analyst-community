name: Windows binary

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-binary:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          channels: defaults,r,free
          channel-priority: flexible

      - name: Create legacy build environment
        run: |
          conda create -n openmeta-analyst-community -y -c defaults -c r -c free `
            python=2.7 `
            pyqt=4.11.4 `
            r-base=3.3.2 `
            rpy2=2.8.5 `
            nose=1.3.7 `
            pip

      - name: Install and compile R dependencies
        run: .\scripts\install-r-deps.ps1 -EnvName openmeta-analyst-community

      - name: Build Windows binary
        run: .\scripts\build-windows-binary.ps1 -EnvName openmeta-analyst-community -ArtifactName OpenMetaAnalyst-windows-x64

      - name: Upload Windows binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMetaAnalyst-windows-x64
          path: artifacts\OpenMetaAnalyst-windows-x64.zip
          if-no-files-found: error
          compression-level: 0

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tagName = $env:GITHUB_REF_NAME
          $assetPath = "artifacts\OpenMetaAnalyst-windows-x64.zip"
          $releaseTitle = "OpenMeta[Analyst] Community $tagName - Windows and macOS binaries"
          $notes = @(
            "Community-maintained binary builds for OpenMeta[Analyst] Community."
            ""
            "Downloads:"
            "- Windows x64: OpenMetaAnalyst-windows-x64.zip"
            "- macOS Intel x64: OpenMetaAnalyst-macos-x64.zip"
            ""
            "This project is not affiliated with or endorsed by Brown University or the original maintainers."
          ) -join [Environment]::NewLine

          gh release view $tagName --repo $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) {
            gh release create $tagName `
              --repo $env:GITHUB_REPOSITORY `
              --title $releaseTitle `
              --notes $notes `
              --verify-tag
            if ($LASTEXITCODE -ne 0) { throw "GitHub release creation failed." }
          }

          gh release edit $tagName `
            --repo $env:GITHUB_REPOSITORY `
            --title $releaseTitle `
            --notes $notes
          if ($LASTEXITCODE -ne 0) { throw "GitHub release edit failed." }

          gh release upload $tagName `
            "$assetPath#Windows x64 binary (.exe ZIP)" `
            --repo $env:GITHUB_REPOSITORY `
            --clobber
          if ($LASTEXITCODE -ne 0) { throw "GitHub release upload failed." }
