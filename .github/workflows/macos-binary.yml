name: macOS binary

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-binary:
    runs-on: macos-15-intel
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          channels: defaults,r,free
          channel-priority: flexible

      - name: Create legacy build environment
        run: |
          conda create -n openmeta-analyst-community -y -c defaults -c r -c free \
            python=2.7 \
            pyqt=4.11.4 \
            r-base=3.3.2 \
            rpy2=2.8.5 \
            nose=1.3.7 \
            python.app=1.2 \
            pyinstaller=3.5 \
            pip

      - name: Install and compile R dependencies
        run: bash ./scripts/install-r-deps.sh openmeta-analyst-community

      - name: Build macOS binary
        run: bash ./scripts/build-macos-binary.sh openmeta-analyst-community OpenMetaAnalyst-macos-x64

      - name: Upload macOS binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenMetaAnalyst-macos-x64
          path: artifacts/OpenMetaAnalyst-macos-x64.zip
          if-no-files-found: error
          compression-level: 0

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag_name="${GITHUB_REF_NAME}"
          asset_path="artifacts/OpenMetaAnalyst-macos-x64.zip"
          release_title="OpenMeta[Analyst] Community ${tag_name} - Windows and macOS binaries"
          release_notes=$'Community-maintained binary builds for OpenMeta[Analyst] Community.\n\nDownloads:\n- Windows x64: OpenMetaAnalyst-windows-x64.zip\n- macOS Intel x64: OpenMetaAnalyst-macos-x64.zip\n\nThis project is not affiliated with or endorsed by Brown University or the original maintainers.'

          if ! gh release view "${tag_name}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${tag_name}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${release_title}" \
              --notes "${release_notes}" \
              --verify-tag
          fi

          gh release edit "${tag_name}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${release_title}" \
            --notes "${release_notes}"

          gh release upload "${tag_name}" \
            "${asset_path}#macOS Intel x64 binary (.app ZIP)" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
